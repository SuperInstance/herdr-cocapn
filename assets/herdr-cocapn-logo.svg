<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89b4fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a6e3a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="capn" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5c2e7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f9e2af;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#89b4fa" stroke-width="2" opacity="0.3"/>
  <!-- Herd of dots (agent panes) -->
  <circle cx="60" cy="65" r="12" fill="url(#hdr)" opacity="0.7"/>
  <circle cx="100" cy="55" r="10" fill="url(#hdr)" opacity="0.6"/>
  <circle cx="140" cy="70" r="14" fill="url(#hdr)" opacity="0.8"/>
  <circle cx="80" cy="110" r="11" fill="url(#hdr)" opacity="0.5"/>
  <circle cx="130" cy="115" r="13" fill="url(#hdr)" opacity="0.7"/>
  <!-- CoCapn anchor/helm circle -->
  <circle cx="100" cy="90" r="22" fill="none" stroke="#cba6f7" stroke-width="3"/>
  <circle cx="100" cy="90" r="8" fill="#cba6f7"/>
  <!-- Connecting lines (fleet management network) -->
  <line x1="60" y1="65" x2="100" y2="90" stroke="#a6e3a1" stroke-width="1" opacity="0.4"/>
  <line x1="140" y1="70" x2="100" y2="90" stroke="#a6e3a1" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="110" x2="100" y2="90" stroke="#a6e3a1" stroke-width="1" opacity="0.4"/>
  <line x1="130" y1="115" x2="100" y2="90" stroke="#a6e3a1" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="55" x2="100" y2="90" stroke="#a6e3a1" stroke-width="1" opacity="0.4"/>
  <!-- Text -->
  <text x="100" y="155" text-anchor="middle" font-family="monospace" font-size="16" fill="#cdd6f4" font-weight="bold">herdr</text>
  <text x="100" y="175" text-anchor="middle" font-family="monospace" font-size="11" fill="#a6adc8">+ cocapn</text>
</svg>
